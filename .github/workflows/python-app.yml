name: Python application

on:
  push:
    branches: [ "main", "Criar_PostgreSQL" ]
  pull_request:
    branches: [ "main", "Criar_PostgreSQL" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    # Adiciona um serviço de banco de dados Postgres para os testes
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: loja_user
          POSTGRES_PASSWORD: mortadela12
          POSTGRES_DB: loja_test_db
        ports:
          - 5432:5432
        # Aguarda o postgres estar pronto antes de iniciar os testes
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov  # Garante que as ferramentas de teste estão lá

    - name: Run pytest
      env:
        # Esta variável aponta para o serviço do Postgres criado acima
        DATABASE_URL: postgresql+psycopg://loja_user:mortadela12@localhost:5432/loja_test_db
      run: |
        pytest