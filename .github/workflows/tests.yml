name: Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: loja_user
          POSTGRES_PASSWORD: loja_password
          POSTGRES_DB: loja_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U loja_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_USER: loja_user
      DB_PASSWORD: loja_password
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: loja_db
      DATABASE_URL: postgresql+psycopg2://loja_user:loja_password@localhost:5432/loja_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run pytest
        run: pytest -v --disable-warnings
